<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>BMI Calculator</h1>
        <div class="input-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" placeholder="Enter height in cm">
        </div>
        <div class="input-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="Enter weight in kg">
        </div>
        <button onclick="calculateBMI()">Calculate BMI</button>
        <div id="result"></div>
        
        <div class="chart-container" id="chartContainer" style="display:none;">
            <h2>BMI Scale</h2>
            <div class="bmi-scale">
                <div class="scale-segment underweight"><span>Underweight<br>&lt; 18.5</span></div>
                <div class="scale-segment normal"><span>Normal<br>18.5 - 24.9</span></div>
                <div class="scale-segment overweight"><span>Overweight<br>25 - 29.9</span></div>
                <div class="scale-segment obese"><span>Obese<br>≥ 30</span></div>
                <div class="bmi-indicator" id="bmiIndicator"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
