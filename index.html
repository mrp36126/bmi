<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="glass-card">
        <div class="header-row">
            <h1>BMI Calculator</h1>
            <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode">
                <span class="material-icons">dark_mode</span>
            </button>
        </div>
        <p class="subtitle">Check your body mass index</p>
        
        <div class="input-group">
            <label for="height">
                <span class="material-icons">height</span>
                Height (cm)
            </label>
            <input type="number" id="height" placeholder="175">
        </div>
        
        <div class="input-group">
            <label for="weight">
                <span class="material-icons">fitness_center</span>
                Weight (kg)
            </label>
            <input type="number" id="weight" placeholder="70">
        </div>
        
        <button class="primary-btn" onclick="calculateBMI()">
            Calculate BMI
            <span class="btn-icon">→</span>
        </button>
        
        <div class="result-container" id="resultContainer">
            <div id="result"></div>
            <div class="chart-container" id="chartContainer">
                <canvas id="bmiChart"></canvas>
            </div>
            
            <div class="history-section" id="historySection">
                <h3>Your History</h3>
                <div class="history-list" id="historyList"></div>
                <button class="text-btn" onclick="clearHistory()">
                    <span class="material-icons">delete</span>
                    Clear History
                </button>
            </div>
            
            <div class="share-section">
                <button class="share-btn" onclick="shareResult()">
                    <span class="material-icons">share</span>
                    Share Result
                </button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
